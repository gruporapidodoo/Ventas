<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ventas - Iniciar Sesion</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f4f6f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #fff;
            border-radius: 16px;
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
            border: 1px solid #e2e5eb;
        }
        .login-logo {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, #6366f1, #818cf8);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; color: #fff; font-weight: 800;
            margin: 0 auto 24px;
        }
        h1 { text-align: center; font-size: 22px; font-weight: 700; margin-bottom: 4px; color: #1a1d27; }
        .subtitle { text-align: center; font-size: 13px; color: #6b7280; margin-bottom: 32px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
        input {
            width: 100%; padding: 12px 14px; border: 1px solid #e2e5eb;
            border-radius: 8px; font-size: 14px; font-family: inherit;
            background: #f9fafb; transition: border-color 0.2s;
        }
        input:focus { outline: none; border-color: #6366f1; background: #fff; }
        .field { margin-bottom: 20px; }
        .btn-login {
            width: 100%; padding: 12px; background: #6366f1; color: #fff;
            border: none; border-radius: 8px; font-size: 14px; font-weight: 600;
            font-family: inherit; cursor: pointer; transition: background 0.2s;
        }
        .btn-login:hover { background: #818cf8; }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
        .error {
            background: rgba(220,38,38,0.08); color: #dc2626;
            padding: 10px 14px; border-radius: 8px; font-size: 13px;
            margin-bottom: 16px; display: none;
        }
        .powered { text-align: center; margin-top: 24px; font-size: 11px; color: #9ca3af; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">V</div>
        <h1>Ventas x Dia x Mes</h1>
        <div class="subtitle">Inicia sesion con tu cuenta de Odoo</div>
        <div class="error" id="error"></div>
        <form id="loginForm">
            <div class="field">
                <label for="login">Usuario / Email</label>
                <input type="text" id="login" placeholder="tu@email.com" autocomplete="username" required>
            </div>
            <div class="field">
                <label for="password">Contrasena</label>
                <input type="password" id="password" placeholder="Tu contrasena de Odoo" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn-login" id="btnLogin">Iniciar Sesion</button>
        </form>
        <div class="powered">Conectado a Odoo 18 Enterprise</div>
    </div>
    <script>
        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = document.getElementById("btnLogin");
            const err = document.getElementById("error");
            err.style.display = "none";
            btn.disabled = true;
            btn.textContent = "Verificando...";
            try {
                const res = await fetch("/api/login", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({
                        login: document.getElementById("login").value,
                        password: document.getElementById("password").value,
                    }),
                });
                const data = await res.json();
                if (data.ok) {
                    window.location.href = "/";
                } else {
                    err.textContent = data.error || "Error de autenticacion";
                    err.style.display = "block";
                }
            } catch (ex) {
                err.textContent = "Error de conexion";
                err.style.display = "block";
            }
            btn.disabled = false;
            btn.textContent = "Iniciar Sesion";
        });
    </script>
</body>
</html>
